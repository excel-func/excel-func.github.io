<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdurayim Compilers</title>
    <link rel="icon" type="image/png" href="image.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
        
        .links-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .compiler-link {
            text-decoration: none;
            color: white;
            background-color: black;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .compiler-link:hover {
            background-color: #2980b9;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        
        .python-link {
            background-color: dodgerblue;
        }
        
        .excel-link {
            background-color: green;
        }
        
        .cpp-link {
            background-color: #0b5cff;
        }
        
        .html-link {
            background-color: orange;
        }
        
        .html-link:hover {
            background-color: red;
        }
        
        .python-link:hover {
            background-color: blue;
        }
        
        .cpp-link:hover {
            background-color: #00eaffdc;
        }
        
        .excel-link:hover {
            background-color: darkgreen;
        }
        
        .footer-text {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Abdurayim Compilers</h1>

    <div class="links-container">
        <a href="/html/" class="compiler-link html-link">HTML Compiler</a>
        <a href="/python/" class="compiler-link python-link">Python Compiler</a>
        <a href="/cpp/" class="compiler-link cpp-link">C++ Compiler</a>
    </div>
    <div class="links-container">
        <a href="/excel/" class="compiler-link excel-link">excel functions</a>

    </div>
    <p class="footer-text">another compilers coming soon</p>

</body>

</html>
