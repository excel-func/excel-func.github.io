<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdurayim Compilers</title>
    <link rel="icon" type="image/png" href="image.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .links-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .compiler-link {
            text-decoration: none;
            color: white;
            background-color: #3498db;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .compiler-link:hover {
            background-color: #2980b9;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .python-link {
            background-color: #2ecc71;
        }

        .python-link:hover {
            background-color: #27ae60;
        }

        /* Стиль для подписи под кнопками */
        .footer-text {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Abdurayim Compilers</h1>

    <div class="links-container">
        <a href="https://abdurayim-1.github.io/html/" class="compiler-link">HTML Compiler</a>
        <a href="https://abdurayim-1.github.io/python/" class="compiler-link python-link">Python Compiler</a>
    </div>

    <p class="footer-text">another compilers coming soon</p>

</body>
</html>
